<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="420" height="100">
  <!-- HALO — Refined architectural letterforms
       Optically balanced spacing, consistent 4.5px stroke, sharper geometry.
       The H crossbar has a subtle 4° angle — enough to notice, not enough to look broken.
       The A is taller and narrower for better proportion. The O sits tighter to the L. -->

  <!-- H — narrower stance, subtle angled crossbar -->
  <path d="M 20 86 L 20 14" fill="none" stroke="#6D28D9" stroke-width="4.5" stroke-linecap="square"/>
  <path d="M 56 86 L 56 14" fill="none" stroke="#6D28D9" stroke-width="4.5" stroke-linecap="square"/>
  <path d="M 20 52 L 56 48" fill="none" stroke="#6D28D9" stroke-width="4.5" stroke-linecap="square"/>

  <!-- A — slightly narrower, sharper peak, no crossbar -->
  <path d="M 82 86 L 112 14 L 142 86" fill="none" stroke="#6D28D9" stroke-width="4.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- L — clean right angle -->
  <path d="M 168 14 L 168 86 L 210 86" fill="none" stroke="#6D28D9" stroke-width="4.5" stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- O — tighter to the L, slightly thicker stroke to match optical weight of solid letters -->
  <circle cx="272" cy="50" r="36" fill="none" stroke="#6D28D9" stroke-width="5"/>
</svg>
