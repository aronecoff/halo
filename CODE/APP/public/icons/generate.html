<!DOCTYPE html>
<html>
<body>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<canvas id="cm512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, maskable) {
  const ctx = canvas.getContext('2d');
  const s = canvas.width;

  // Background
  ctx.fillStyle = '#07070D';
  if (maskable) {
    ctx.fillRect(0, 0, s, s);
  } else {
    ctx.beginPath();
    ctx.roundRect(0, 0, s, s, s * 0.22);
    ctx.fill();
  }

  // Purple gradient orb
  const cx = s / 2, cy = s * 0.38, r = s * 0.18;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
  grad.addColorStop(0, '#A78BFA');
  grad.addColorStop(0.4, '#7C3AED');
  grad.addColorStop(1, '#4C1D95');
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // Glow
  const glow = ctx.createRadialGradient(cx, cy, r, cx, cy, r * 2);
  glow.addColorStop(0, 'rgba(167,139,250,0.2)');
  glow.addColorStop(1, 'rgba(167,139,250,0)');
  ctx.beginPath();
  ctx.arc(cx, cy, r * 2, 0, Math.PI * 2);
  ctx.fillStyle = glow;
  ctx.fill();

  // Text "HALO"
  const fontSize = s * 0.14;
  ctx.font = `900 ${fontSize}px -apple-system, system-ui, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.letterSpacing = `${s * 0.02}px`;

  const textGrad = ctx.createLinearGradient(cx - s*0.2, cy, cx + s*0.2, cy);
  textGrad.addColorStop(0, '#A78BFA');
  textGrad.addColorStop(0.5, '#7C3AED');
  textGrad.addColorStop(1, '#6D28D9');
  ctx.fillStyle = textGrad;
  ctx.fillText('HALO', cx, s * 0.68);

  return canvas.toDataURL('image/png');
}

// Generate and download
['c192','c512','cm512'].forEach(id => {
  const c = document.getElementById(id);
  const maskable = id.startsWith('cm');
  const dataUrl = drawIcon(c, maskable);
  const a = document.createElement('a');
  a.href = dataUrl;
  const size = c.width;
  a.download = maskable ? `icon-maskable-${size}.png` : `icon-${size}.png`;
  document.body.appendChild(a);
  // a.click(); // Uncomment to auto-download
});
</script>
</body>
</html>
